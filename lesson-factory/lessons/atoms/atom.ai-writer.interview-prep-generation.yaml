id: atom.ai-writer.interview-prep-generation
title: 取材準備の質問リストをAIで生成する
summary: "取材前の質問づくり、意外と時間がかかりますよね。「何を聞けばいいかわからない」「質問が思いつかない」という悩みを、AI（＝人工知能にお願いして答えを出してもらう仕組み）があっという間に解決してくれます。 このレッスンでは、あなたが 15分以内 で「取材に使える質問リスト」をAIに作ってもらう方法を学びます。"
