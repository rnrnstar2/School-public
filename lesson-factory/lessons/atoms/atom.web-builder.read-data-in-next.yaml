id: atom.web-builder.read-data-in-next
title: Next.js でデータを読み込む
summary: "レストランでメニューを注文する場面を想像してみてください。あなたがウェイターに注文を伝え、厨房から料理が出てきてテーブルに並ぶ——この流れは、ウェブページがデータを読み込む仕組みとそっくりです。厨房（＝データの置き場所）に注文を出して、料理（＝データ）をテーブル（＝画面）に運ぶ。"
