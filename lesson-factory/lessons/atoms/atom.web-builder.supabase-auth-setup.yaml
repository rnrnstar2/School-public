summary: "このレッスンでは、あなたが作っているアプリに「メールアドレスとパスワードでログインする仕組み」を 15 分で組み込みます。イメージは、家の玄関に鍵を取り付ける作業です。鍵の仕組み（Supabase Auth ＝ユーザー管理の裏方）そのものを作るのではなく、用意された鍵を玄関にはめ込む感覚で進めます。"
