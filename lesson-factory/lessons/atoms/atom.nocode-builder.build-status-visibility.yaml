id: atom.nocode-builder.build-status-visibility
title: 進行状況の見える化を作る
summary: "チームで仕事をしていると、「あの件、今どうなってる？」と何度も聞かれた経験はありませんか？ 料理でいえば、オーブンに小窓がなくて中が見えない状態です。進行状況が見えないと、つい扉を開けて確認したくなりますよね。この Atom では、AIの力を借りて「プロジェクトの小窓」――つまり進行状況がひと目でわかる..."
