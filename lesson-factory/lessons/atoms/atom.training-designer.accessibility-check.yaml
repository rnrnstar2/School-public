id: atom.training-designer.accessibility-check
title: 教材のアクセシビリティを確認する
summary: "あなたが作った教材は、すべての学習者にとって使いやすいものになっていますか？ アクセシビリティ（＝年齢・障がい・環境に関係なく、誰でも情報を受け取れるようにすること）は、特別な技術力がなくてもAIの力を借りて確認できます。たとえるなら、料理のレシピを書いたあとに「これ、初めての人でも迷わず作れるかな？"
