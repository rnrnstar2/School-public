id: atom.web-builder.vercel-env-and-secrets
title: Vercelに環境変数を正しく設定する
summary: "料理をするとき、レシピ帳には「塩少々」と書いてあっても、実際に使う塩の量は家庭ごとに違いますよね。Webアプリにも同じように、コード本体とは別に「このアプリ専用の設定値」を渡す仕組みがあります。それが 環境変数 （＝アプリが裏側で読み取る、パスワードやAPIキーなどの秘密のメモ帳）です。"
