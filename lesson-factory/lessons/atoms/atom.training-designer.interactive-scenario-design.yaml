id: atom.training-designer.interactive-scenario-design
title: 分岐型シナリオ教材を設計する
summary: "「もし A を選んだらこうなる、B を選んだらこうなる」——これは RPG やアドベンチャーゲームでおなじみの仕組みですよね。この仕組みを教材に取り入れたものが 分岐型シナリオ教材 です。学習者が選択肢を選ぶたびにストーリーが変わるので、「自分ごと」として考えながら学べるのが最大の強みです。"
