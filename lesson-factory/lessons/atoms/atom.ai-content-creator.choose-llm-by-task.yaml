id: atom.ai-content-creator.choose-llm-by-task
title: コンテンツ用途別に LLM（ChatGPT / Claude 等）を使い分ける
summary: "コンテンツ制作では、台本ライティング・SNS コピー・要約・動画ナレーション原稿など、求められる文体や得意分野が場面ごとに違います。料理に例えるなら「煮込みは土鍋、炒めはフライパン」のように、AI も用途ごとに最適なモデルを使い分けると仕上がりが安定します。このレッスンでは、ChatGPT・Claude・その他主要 LLM のコンテンツ用途別の得意/不得意を 15 分で整理し、自分の常用 2-3 モデルを決めて手元にチートシートを 1 枚作ります。完了する頃には『この投稿はこっち、あの台本はこっち』と迷わず使い分けられます。"
