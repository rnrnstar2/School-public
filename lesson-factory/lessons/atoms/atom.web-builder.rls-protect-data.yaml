id: atom.web-builder.rls-protect-data
title: RLSで「自分のデータだけ見える」を実現する
summary: "あなたが作っているサービスに、ユーザーそれぞれのメモや予約情報が保存されるとします。このとき「Aさんのデータが、ログインした別のBさんに見えてしまう」と大事故です。これを防ぐしくみが RLS（ロー・レベル・セキュリティ／＝行単位のアクセス制御） です。"
