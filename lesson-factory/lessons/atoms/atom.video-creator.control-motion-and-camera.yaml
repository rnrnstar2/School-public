id: atom.video-creator.control-motion-and-camera
title: 動きとカメラ演出を調整する
summary: "映像づくりで「なんか動きがのっぺりしているな…」と感じたことはありませんか？ 実は、映画やCMのプロも、カメラの動かし方（＝パン、ズーム、トラッキングなど）で「ワクワク感」を生み出しています。 料理にたとえると、食材をそのまま皿に盛るだけでは「美味しそう」に見えません。"
