id: atom.training-designer.slide-design-polish
title: スライドのデザインを仕上げる
summary: "料理でいうと、食材を切りそろえて味付けは終わっている状態。あとは「盛り付け」をするだけ、という場面を想像してください。どんなに美味しい料理でも、見た目が雑だと「美味しそう！」とは感じられません。スライドも同じです。内容が良くても、文字が小さすぎたり色がバラバラだと、聞き手の気持ちが離れてしまいます。"
