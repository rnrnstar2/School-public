id: atom.web-builder.install-shadcn
title: shadcn/uiを導入して最初のボタンを表示する
summary: "この回では、あなたのNext.jsアプリに「shadcn/ui（＝見た目がきれいなボタンやフォーム部品の詰め合わせ）」を入れて、最初のボタンを画面に出すところまでを15分でやります。料理でいうと、野菜を一から刻むのではなく、下ごしらえ済みの素材パックを買ってきて盛り付けるイメージです。"
