id: atom.video-creator.create-broll-with-ai
title: AIでBロール素材を作る
summary: "動画を作っていると、「話している映像だけだと単調だな…」と感じることがありませんか？ そんなときに挟み込む補助映像のことを Bロール と呼びます。料理番組でいえば、出演者が話している間に映る「野菜を刻む手元のカット」や「完成した料理のアップ」がまさにBロールです。"
