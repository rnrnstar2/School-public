id: atom.office-automator.spreadsheet-dashboard
title: スプレッドシートで自動更新ダッシュボードを作る
summary: "あなたは毎週、同じデータを手でグラフにまとめていませんか？ それはまるで、毎朝コーヒーを淹れるたびにコーヒーメーカーの説明書を最初から読み直すようなものです。一度「自動で淹れる仕組み」をセットすれば、ボタンひとつで毎朝おいしいコーヒーが出てきます。スプレッドシートのダッシュボードも同じです。"
