id: atom.data-analyst.compare-periods
title: 期間比較で差分を読む
summary: "売上やアクセス数のレポートを見て「先月より増えたのかな？」と気になったことはありませんか？このレッスンでは、2つの期間を比べて違いを読み取る「期間比較」のやり方を、AIツールと一緒に15分で身につけます。 料理にたとえると、期間比較は「先週の食材費と今週の食材費を並べて、どっちが高かったか調べる」ようなもの。"
