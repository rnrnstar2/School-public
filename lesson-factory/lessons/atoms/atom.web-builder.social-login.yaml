id: atom.web-builder.social-login
title: GoogleやGitHubでソーシャルログインを追加する
summary: "このレッスンでは、あなたのアプリに「Googleでログイン」や「GitHubでログイン」ボタンを追加します。ソーシャルログイン（＝他のサービスのアカウントを使ってログインできる仕組み）を入れると、ユーザーはメールアドレスとパスワードを新しく覚える必要がなくなり、登録のハードルがぐっと下がります。"
