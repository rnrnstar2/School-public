summary: "「同じ教材を全員に配って、誰にも刺さらない」――そんな経験はありませんか？料理にたとえると、全員に同じ味付けの料理を出すのではなく、一人ひとりの好みに合わせて調味料を調整していくイメージです。学習の世界でも、学習者の反応を見ながら教材をちょっとずつ調整する「改善サイクル」を回すことで..."
