id: atom.ai-content-creator.batch-produce-short-scripts
title: ショート動画の台本を 1 セッションでまとめ生成する
summary: "ショート動画を毎日投稿するクリエイターにとって、台本を 1 本ずつ書くのは時間泥棒です。お弁当作りで言えば、毎朝おかずを 1 品ずつ違うフライパンで作っているような状態。このレッスンでは、ChatGPT または Claude を使って 1 週間ぶん（5-7 本）のショート動画台本を 1 セッションでまとめて下書きする手順を身に付けます。テーマと尺・トーンをテンプレ化したプロンプトに落とし、AI に一括生成させ、最後に人間が hook と CTA だけ整えるワークフローです。完了時には『今週ぶんを月曜 60 分でまとめて作る』運用に切り替わります。"
