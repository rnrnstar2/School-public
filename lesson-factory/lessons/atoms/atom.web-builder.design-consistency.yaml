id: atom.web-builder.design-consistency
title: 見た目の統一感を整える
summary: "レストランのメニューを想像してみてください。前菜は和風の皿、メインは洋食のプレート、デザートは中華の器……いろんな雰囲気が混ざっていると、「このお店は何のお店なんだろう？」と迷ってしまいますよね。 Webサイトも同じです。ページごとに色や文字の大きさがバラバラだと、訪れた人が「ここは何のサイト？"
