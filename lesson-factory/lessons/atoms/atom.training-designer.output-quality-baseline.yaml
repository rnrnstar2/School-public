id: atom.training-designer.output-quality-baseline
title: AI出力の品質基準を設定する
summary: "料理をするとき、「味見」をしますよね。塩加減はどうか、火は通っているか、盛り付けはきれいか。この「味見の基準」があいまいだと、毎回ちがう味になってしまいます。 AIが書いた文章や作った資料も同じです。「なんとなくよさそう」で終わらせず、 「ここをチェックすればOK」という明確な基準 を持っておくと..."
