id: atom.ai-writer.brand-voice-definition
title: ブランドボイスガイドを作成する
summary: "あなたがSNSやブログで情報を発信するとき、「この人っぽいな」と読者に感じてもらえる文章の個性――それが ブランドボイス です。たとえば料理でいえば、同じカレーでも家庭ごとに「うちの味」がありますよね。文章にも同じように「自分の味」を決めておくと、AIに文章を書いてもらうときにもブレない仕上がりになります。"
