id: atom.office-automator.custom-gpt-for-team
title: 自社専用のカスタムGPT/Copilotエージェントを作る
summary: "ChatGPT には「カスタムGPT」という機能があります。これは、あなたの会社や仕事の情報をあらかじめ覚えさせた 自分だけの専用 AI アシスタント を作れるしくみです。 たとえば、飲食店なら「うちのメニューと接客マニュアルを覚えた AI」、不動産会社なら「物件情報と接客トークを知っている..."
