id: atom.web-builder.contact-form-with-notification
title: お問い合わせフォーム＋通知を設置する
summary: "あなたのWebサイトに「お問い合わせフォーム」を置くのは、お店の入り口に「ご意見箱」を設置するようなものです。お客様がメッセージを書いて投函すると、あなたはその内容を受け取れます。さらに「通知」をつければ、新しいメッセージが届いたことをすぐメールで知ることができます。"
