id: atom.data-analyst.segment-trend-drivers
title: 変化の要因を切り分ける
summary: "売上や利用者数が先月より増えた（または減った）とき、「なぜ？」と聞かれて困ったことはありませんか？ 数字全体だけを眺めていても、原因は見えてきません。たとえば料理の味が変わったとき、「塩が多かった」のか「火加減が強すぎた」のか、一つずつ確かめるように、データでも要因をひとつずつ切り分けて調べる必要があります。"
