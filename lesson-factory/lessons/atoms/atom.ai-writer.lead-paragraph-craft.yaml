id: atom.ai-writer.lead-paragraph-craft
title: リード文をAIと共作する
summary: "レストランの入り口で笑顔のスタッフに「ようこそ！」と迎えられたら、思わず中に入りたくなりますよね。 Web記事やブログにも同じ役割をもつ部分があります。それが リード文（＝読者を最初に引き込む導入部分） です。魅力的なリード文があると、読者は「この先も読んでみたい」と自然に思ってくれます。"
