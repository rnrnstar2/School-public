id: atom.office-automator.estimate-automation-roi
title: 自動化の費用対効果をざっくり計算する
summary: "「これ、自動化した方がいいのかな？」と思ったとき、感覚だけで決めるのではなく、 数字でざっくり判断 できるようになります。 たとえば、毎日15分かかるデータ入力があるとします。これを自動化するのに最初の準備で2時間かかる場合、「何日で元が取れるか」を計算できれば、やるべきかどうか自信を持って決められます。"
