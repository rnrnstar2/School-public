id: atom.video-creator.localize-and-caption-shorts
title: 字幕と文言を短尺向けに整える
summary: "最近のショート動画では、視聴者の多くが音を消して見ています。だからこそ、字幕（＝動画の下に表示される文字）は「映像の案内役」としてとても重要です。 この Atom では、AIツールを使って短尺動画（＝15秒〜60秒くらいの縦型動画）に字幕を付け、文言を短く分かりやすく整える方法を学びます。"
