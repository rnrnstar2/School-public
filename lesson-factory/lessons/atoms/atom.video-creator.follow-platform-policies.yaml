id: atom.video-creator.follow-platform-policies
title: 配信先のポリシーを守る
summary: "AIで動画を作ったあと、「さあ投稿しよう！」とそのままアップロードしていませんか？ 実は、YouTubeやTikTok、Instagramなど配信先（＝動画を公開する場所）ごとに「投稿してよい動画のルール」が決まっています。ルールを見落とすと、動画が削除されたり、アカウントが停止されたりすることもあります。"
