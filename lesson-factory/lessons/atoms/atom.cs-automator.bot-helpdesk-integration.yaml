id: atom.cs-automator.bot-helpdesk-integration
title: ボットとヘルプデスクを統合する
summary: "レストランで例えてみましょう。お店には「自動応答の受付係（ボット）」と「キッチンのシェフ（ヘルプデスクの担当者）」がいます。受付係が一人で解決できるお客様もいれば、シェフにバトンタッチしなければならない注文もあります。 このレッスンでは、受付係からシェフへスムーズに注文を渡す「橋渡しの仕組み」を作ります。"
