id: atom.web-builder.ask-ai-about-errors
title: エラーが出たらAIに正しく聞く
summary: "Webアプリを作っていると、急に画面が真っ白になったり、赤い文字がズラッと出たりします。そんなときは、AI（＝あなたの質問に答えてくれる賢い助手）に助けを求めるのが一番の近道です。 でも、AIに「動きません」とだけ伝えるのは、病院で「体調が悪いです」とだけ言うようなもの。お医者さんも「どこが痛いですか？"
