id: atom.ai-marketer.search-intent-classify
title: 検索意図を分類する
summary: "ネットで何かを検索するとき、あなたにはかならず「目的」がありますよね。 「やり方を知りたい」「この商品を買いたい」「あのサイトに行きたい」——実はこうした目的は、大きく 4 つのパターン に分けられます。 この Atom では、検索キーワードを見ただけで「この人は何がしたいのか」を見分けられるようになります。"
