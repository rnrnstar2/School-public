id: atom.ai-writer.grammar-style-check
title: 文法と表記ゆれをAIで検出する
summary: "長い文章を書いたあと、「送りがなの間違い」や「です・ます」と「だ・である」の混在に気づいて冷や汗をかいたことはありませんか？ これは 表記ゆれ （＝同じ意味の言葉なのに、漢字・ひらがなの使い分けがバラバラになっていること）や 文体の混在 （＝「です・ます調」と「だ・である調」が混ざってしまうこと）と呼ばれる..."
